<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Board shape -->
  <path d="M160,30 Q200,10 240,30 L255,100 Q260,300 255,500 L240,570 Q200,590 160,570 L145,500 Q140,300 145,100 Z" 
        fill="url(#board)" stroke="#22c55e" stroke-width="2"/>
  <!-- Brand text -->
  <text x="200" y="250" text-anchor="middle" fill="white" font-family="Arial Black,sans-serif" font-size="22" font-weight="bold" letter-spacing="3">RIDE</text>
  <!-- Model text -->
  <text x="200" y="290" text-anchor="middle" fill="#22c55e" font-family="Arial,sans-serif" font-size="14" font-weight="bold" letter-spacing="2">WARPIG</text>
  <!-- Decorative lines -->
  <line x1="170" y1="310" x2="230" y2="310" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <line x1="175" y1="320" x2="225" y2="320" stroke="#14b8a6" stroke-width="1" opacity="0.3"/>
</svg>